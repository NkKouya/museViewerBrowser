<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
  <h2>Muse EEG Real-time Plot (4ch)</h2>
  <div id="plot" style="width:100%;height:900px;"></div>

  <script>
    const ws = new WebSocket("ws://localhost:8765");

    // 4ch の名前
    const channels = ["TP9", "AF7", "AF8", "TP10"];

    // 4つのトレース（サブプロット用）
    const traces = channels.map((ch, i) => ({
      x: [],
      y: [],
      mode: "lines",
      name: ch,
      xaxis: "x" + (i + 1),
      yaxis: "y" + (i + 1)
    }));

    // サブプロットレイアウト
    const layout = {
      grid: { rows: 4, columns: 1, pattern: "independent" },
      height: 900,
      title: "Muse EEG 4ch Real-time",
      margin: { l: 50, r: 20, t: 50, b: 20 }
    };

    Plotly.newPlot("plot", traces, layout);

    let sampleIndex = 0;

    ws.onmessage = (event) => {
      const sample = JSON.parse(event.data); // [ch1, ch2, ch3, ch4]

      sample.forEach((value, i) => {
        traces[i].x.push(sampleIndex);
        traces[i].y.push(value);
      });

      sampleIndex++;

      // 古いデータを削除（1000点だけ保持）
      traces.forEach(t => {
        if (t.x.length > 1000) {
          t.x.shift();
          t.y.shift();
        }
      });

      Plotly.update("plot", traces);
    };
  </script>
</body>
</html>

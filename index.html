<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="plot" style="width:100%;height:600px;"></div>

    <script>
        const ws = new WebSocket("ws://localhost:8765");

        let x = [];
        let y = [[], [], [], []]; // Muse EEG 4ch

        Plotly.newPlot('plot', [
            { y: y[0], mode: 'lines', name: 'TP9' },
            { y: y[1], mode: 'lines', name: 'AF7' },
            { y: y[2], mode: 'lines', name: 'AF8' },
            { y: y[3], mode: 'lines', name: 'TP10' }
        ]);

        ws.onmessage = (event) => {
            const sample = JSON.parse(event.data);

            x.push(Date.now());
            for (let i = 0; i < 4; i++) {
                y[i].push(sample[i]);
            }

            Plotly.update('plot', [
                { y: y[0] },
                { y: y[1] },
                { y: y[2] },
                { y: y[3] }
            ]);
        };
    </script>
</body>
</html>
